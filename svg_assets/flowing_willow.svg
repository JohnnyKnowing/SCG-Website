<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="willow-trunk" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#152533" />
      <stop offset="100%" stop-color="#2E4E68" />
    </linearGradient>
    <linearGradient id="willow-leaf-1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5FA233" stop-opacity="0.75" />
      <stop offset="100%" stop-color="#34533D" stop-opacity="0.85" />
    </linearGradient>
    <linearGradient id="willow-leaf-2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B0C2B4" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#4B6B54" stop-opacity="0.8" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#FAF6EE" rx="12" />
  
  <!-- Swirling Sun/Light in background -->
  <circle cx="200" cy="180" r="90" fill="#FFE082" opacity="0.25" />
  
  <!-- Cascading Willow Strands (Flowing ribbon curves) -->
  <!-- Back strands -->
  <path d="M 140 120 C 100 160, 90 280, 80 340" fill="none" stroke="url(#willow-leaf-2)" stroke-width="12" stroke-linecap="round" />
  <path d="M 260 120 C 300 160, 310 280, 320 340" fill="none" stroke="url(#willow-leaf-2)" stroke-width="12" stroke-linecap="round" />
  
  <!-- Mid strands -->
  <path d="M 170 100 C 130 140, 110 260, 120 360" fill="none" stroke="url(#willow-leaf-1)" stroke-width="14" stroke-linecap="round" />
  <path d="M 230 100 C 270 140, 290 260, 280 360" fill="none" stroke="url(#willow-leaf-1)" stroke-width="14" stroke-linecap="round" />
  <path d="M 200 80 C 160 120, 170 240, 190 370" fill="none" stroke="url(#willow-leaf-2)" stroke-width="16" stroke-linecap="round" opacity="0.9" />

  <!-- Twisting/Flowing Trunk (Liquid Ribbon Style) -->
  <path d="M 175 390 C 175 320, 190 300, 200 240 C 210 180, 190 150, 200 100" fill="none" stroke="url(#willow-trunk)" stroke-width="24" stroke-linecap="round" />
  <path d="M 215 390 C 215 325, 200 305, 195 245 C 190 185, 205 155, 200 100" fill="none" stroke="#2E4E68" stroke-width="12" stroke-linecap="round" opacity="0.4" />
</svg>
