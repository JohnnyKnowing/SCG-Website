<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250" width="100%" height="100%">
  <defs>
    <linearGradient id="earth-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF6EE" />
      <stop offset="100%" stop-color="#EADCC9" />
    </linearGradient>
    <linearGradient id="sprout-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#34533D" />
      <stop offset="100%" stop-color="#5FA233" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#earth-grad)" rx="12" />
  
  <!-- Ground Line -->
  <line x1="40" y1="180" x2="560" y2="180" stroke="#FAF6EE" stroke-width="4" stroke-linecap="round" />
  
  <!-- Stage 1: The Seed -->
  <g transform="translate(100, 0)">
    <!-- Soil mound -->
    <path d="M -40 180 Q 0 165 40 180" fill="none" stroke="#CBBBA8" stroke-width="3" />
    <!-- Seed -->
    <ellipse cx="0" cy="190" rx="14" ry="9" fill="#E07A5F" transform="rotate(-15 0 190)" />
    <!-- Label -->
    <text x="0" y="225" font-family="'DM Sans', sans-serif" font-size="12" fill="#5A6070" text-anchor="middle" font-weight="600">01. Begin</text>
  </g>
  
  <!-- Stage 2: Sprouting -->
  <g transform="translate(300, 0)">
    <!-- Soil mound -->
    <path d="M -40 180 Q 0 165 40 180" fill="none" stroke="#CBBBA8" stroke-width="3" />
    <!-- Seed split -->
    <ellipse cx="-4" cy="190" rx="12" ry="8" fill="#E07A5F" transform="rotate(-30 -4 190)" />
    <!-- Sprout root & shoot -->
    <path d="M 0 188 Q 8 160 5 145" fill="none" stroke="#5FA233" stroke-width="4" stroke-linecap="round" />
    <!-- Root -->
    <path d="M 0 190 Q -8 205 -2 215" fill="none" stroke="#B0C2B4" stroke-width="2.5" stroke-linecap="round" />
    <!-- Tiny leaf -->
    <path d="M 5 145 C 15 145 15 138 5 138 Z" fill="#5FA233" />
    <!-- Label -->
    <text x="0" y="225" font-family="'DM Sans', sans-serif" font-size="12" fill="#5A6070" text-anchor="middle" font-weight="600">02. Sprout</text>
  </g>
  
  <!-- Stage 3: The Sapling -->
  <g transform="translate(500, 0)">
    <!-- Soil mound -->
    <path d="M -40 180 Q 0 165 40 180" fill="none" stroke="#CBBBA8" stroke-width="3" />
    <!-- Seed casing (shrivelling) -->
    <circle cx="-16" cy="192" r="5" fill="#C58B7B" opacity="0.6" />
    <!-- Main stem -->
    <path d="M 0 180 Q -10 135 5 95" fill="none" stroke="url(#sprout-grad)" stroke-width="5" stroke-linecap="round" />
    <!-- Roots -->
    <path d="M 0 180 Q -12 200 -5 220" fill="none" stroke="#4B6B54" stroke-width="3" stroke-linecap="round" opacity="0.7" />
    <path d="M 2 181 Q 12 195 8 212" fill="none" stroke="#4B6B54" stroke-width="2.5" stroke-linecap="round" opacity="0.7" />
    <!-- Leaves -->
    <path d="M 5 95 C 20 90 22 75 10 75 C -2 75 0 90 5 95 Z" fill="#5FA233" />
    <path d="M -3 125 C -20 120 -18 108 -10 108 C -2 108 -1 122 -3 125 Z" fill="#34533D" />
    <!-- Label -->
    <text x="0" y="225" font-family="'DM Sans', sans-serif" font-size="12" fill="#5A6070" text-anchor="middle" font-weight="600">03. Flourish</text>
  </g>
</svg>
