<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="branch-blue" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#152533" />
      <stop offset="100%" stop-color="#2E4E68" />
    </linearGradient>
    <linearGradient id="branch-green" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34533D" />
      <stop offset="100%" stop-color="#B0C2B4" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#FAF6EE" rx="12" />
  
  <!-- Branch 1 (Main Slate Blue) -->
  <path d="M 120 380 Q 150 260 260 180 T 310 60" fill="none" stroke="url(#branch-blue)" stroke-width="6" stroke-linecap="round" />
  <!-- Side Branch 1.1 -->
  <path d="M 218 214 Q 280 200 320 140" fill="none" stroke="#4F7C9C" stroke-width="4" stroke-linecap="round" />
  <!-- Side Branch 1.2 -->
  <path d="M 285 106 Q 260 80 220 70" fill="none" stroke="#2E4E68" stroke-width="3" stroke-linecap="round" />
  
  <!-- Branch 2 (Earthy Sage/Green) -->
  <path d="M 280 380 Q 250 290 160 220 T 110 80" fill="none" stroke="url(#branch-green)" stroke-width="5" stroke-linecap="round" />
  <!-- Side Branch 2.1 -->
  <path d="M 205 255 Q 150 250 100 180" fill="none" stroke="#4B6B54" stroke-width="4.5" stroke-linecap="round" />
  
  <!-- Bud/Leaf Nodes (Glowing Gold circles) -->
  <circle cx="310" cy="60" r="7" fill="#FFB300" />
  <circle cx="320" cy="140" r="5" fill="#FFE082" stroke="#FFB300" stroke-width="1.5" />
  <circle cx="220" cy="70" r="4" fill="#E07A5F" />
  <circle cx="110" cy="80" r="6.5" fill="#FFB300" />
  <circle cx="100" cy="180" r="4.5" fill="#B0C2B4" stroke="#4B6B54" stroke-width="1" />
  
  <!-- Tiny Floating Motes -->
  <circle cx="230" cy="130" r="2" fill="#FFB300" opacity="0.6" />
  <circle cx="170" cy="160" r="3" fill="#FFE082" opacity="0.8" />
  <circle cx="190" cy="80" r="1.5" fill="#FFB300" opacity="0.5" />
</svg>
