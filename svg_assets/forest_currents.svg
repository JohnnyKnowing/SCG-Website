<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="trunk-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#152533" />
      <stop offset="100%" stop-color="#3c5644" />
    </linearGradient>
    <linearGradient id="current-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB300" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#E07A5F" stop-opacity="0.75" />
    </linearGradient>
    <linearGradient id="current-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B0C2B4" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#34533D" stop-opacity="0.8" />
    </linearGradient>
    <linearGradient id="current-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F7C9C" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#203A50" stop-opacity="0.8" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#FAF6EE" rx="12" />
  
  <!-- Tree Canopy Wave Currents -->
  <!-- Left Blue flow -->
  <path d="M 50 180 C 100 100, 220 120, 200 60 C 180 0, 80 80, 50 180 Z" fill="url(#current-blue)" />
  
  <!-- Center Green flow -->
  <path d="M 100 240 C 130 140, 270 160, 200 80 C 130 0, 70 120, 100 240 Z" fill="url(#current-green)" />
  
  <!-- Right Gold/Orange flow -->
  <path d="M 320 220 C 350 130, 250 100, 200 80 C 150 60, 270 300, 320 220 Z" fill="url(#current-gold)" />
  
  <!-- Intertwining branches/foliage (flowing paths) -->
  <path d="M 120 200 C 180 200, 240 180, 290 140" fill="none" stroke="#FAF6EE" stroke-width="5" stroke-linecap="round" opacity="0.8" />
  <path d="M 80 150 C 150 120, 220 150, 270 200" fill="none" stroke="#FAF6EE" stroke-width="4.5" stroke-linecap="round" opacity="0.8" />
  
  <!-- Fluid Trunk Base -->
  <path d="M 160 380 Q 200 280 200 220 Q 200 280 240 380 Z" fill="url(#trunk-grad)" />
</svg>
