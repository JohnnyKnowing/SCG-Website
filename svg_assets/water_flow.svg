<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="wave-blue-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E4E68" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#152533" stop-opacity="0.9" />
    </linearGradient>
    <linearGradient id="wave-blue-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F7C9C" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#203A50" stop-opacity="0.85" />
    </linearGradient>
    <linearGradient id="wave-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B0C2B4" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#34533D" stop-opacity="0.75" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#FAF6EE" rx="12" />
  
  <!-- Abstract flowing waves -->
  <!-- Wave 1: Back Greenish wash -->
  <path d="M -50 180 C 100 130, 200 260, 450 150 L 450 450 L -50 450 Z" fill="url(#wave-green)" />
  
  <!-- Wave 2: Mid Teal/Blue -->
  <path d="M -50 240 C 120 180, 240 320, 450 220 L 450 450 L -50 450 Z" fill="url(#wave-blue-2)" />
  
  <!-- Wave 3: Foreground Deep Blue -->
  <path d="M -50 290 C 80 260, 280 340, 450 270 L 450 450 L -50 450 Z" fill="url(#wave-blue-1)" />
  
  <!-- Fluid ripple accents (thin curves) -->
  <path d="M 50 140 Q 120 170 200 130 T 350 150" fill="none" stroke="#D5C5B2" stroke-width="3" stroke-linecap="round" opacity="0.6" />
  <path d="M 80 100 Q 180 80 280 110" fill="none" stroke="#E07A5F" stroke-width="2" stroke-linecap="round" opacity="0.5" />
</svg>
