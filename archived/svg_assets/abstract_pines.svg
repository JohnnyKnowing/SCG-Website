<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="sky-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF6EE" />
      <stop offset="100%" stop-color="#EADCC9" />
    </linearGradient>
    <linearGradient id="pine-grad-1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#2E4E68" />
      <stop offset="100%" stop-color="#4F7C9C" />
    </linearGradient>
    <linearGradient id="pine-grad-2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#34533D" />
      <stop offset="100%" stop-color="#568060" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#sky-grad)" rx="12" />
  
  <!-- Sun behind mountains -->
  <circle cx="280" cy="180" r="50" fill="#E07A5F" opacity="0.15" />
  <circle cx="280" cy="180" r="35" fill="#FFB300" opacity="0.35" />
  
  <!-- Back Mountain -->
  <path d="M 30 350 L 130 200 L 250 350 Z" fill="#D5C5B2" opacity="0.7" />
  
  <!-- Mid Mountain / Hill -->
  <path d="M 120 350 L 260 160 L 380 350 Z" fill="#B0C2B4" opacity="0.8" />
  
  <!-- Abstract Pines (Minimalist Triangles) -->
  <!-- Pine 1 (Left, Blue-ish) -->
  <path d="M 90 350 L 120 250 L 150 350 Z" fill="url(#pine-grad-1)" />
  <path d="M 100 300 L 120 220 L 140 300 Z" fill="url(#pine-grad-1)" opacity="0.9" />
  
  <!-- Pine 2 (Right, Green-ish) -->
  <path d="M 220 350 L 270 190 L 320 350 Z" fill="url(#pine-grad-2)" />
  <path d="M 235 280 L 270 160 L 305 280 Z" fill="url(#pine-grad-2)" opacity="0.9" />
  
  <!-- Pine 3 (Center Foreground) -->
  <path d="M 160 360 L 195 230 L 230 360 Z" fill="#1C3040" />
  <path d="M 170 300 L 195 200 L 220 300 Z" fill="#1C3040" />
  
  <!-- Foreground Ridge -->
  <path d="M 0 340 Q 150 310 400 345 L 400 400 L 0 400 Z" fill="#FAF6EE" />
</svg>
