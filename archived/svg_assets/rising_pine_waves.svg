<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="sky-sunset" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF6EE" />
      <stop offset="50%" stop-color="#FDF0D5" />
      <stop offset="100%" stop-color="#EADCC9" />
    </linearGradient>
    <linearGradient id="wave-pine-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3225" />
      <stop offset="100%" stop-color="#0F1A13" />
    </linearGradient>
    <linearGradient id="wave-pine-mid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34533D" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#1F3626" stop-opacity="0.95" />
    </linearGradient>
    <linearGradient id="wave-pine-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5FA233" stop-opacity="0.75" />
      <stop offset="100%" stop-color="#3C5644" stop-opacity="0.85" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#sky-sunset)" rx="12" />
  
  <!-- Glowing sun filtering through waves -->
  <circle cx="200" cy="220" r="75" fill="#FFE082" opacity="0.35" />
  <circle cx="200" cy="220" r="45" fill="#FFB300" opacity="0.3" />
  
  <!-- Wave-shaped Pine Tree Structures -->
  <!-- Left Side: Soft light pine waves -->
  <path d="M 200 60 Q 200 120 120 180 Q 200 200 130 260 Q 200 280 80 370 L 220 370 Z" fill="url(#wave-pine-light)" />
  
  <!-- Right Side: Mid green pine waves -->
  <path d="M 200 60 Q 200 130 270 190 Q 200 210 260 270 Q 200 290 320 370 L 180 370 Z" fill="url(#wave-pine-mid)" />
  
  <!-- Foreground Central Trunk / Spine (Darkest fluid wave) -->
  <path d="M 200 60 Q 205 160 195 240 Q 185 300 200 370" fill="none" stroke="url(#wave-pine-dark)" stroke-width="12" stroke-linecap="round" />
  <path d="M 200 160 C 220 180, 240 185, 230 210 C 210 220, 200 210, 200 230" fill="none" stroke="url(#wave-pine-dark)" stroke-width="6" stroke-linecap="round" />
  <path d="M 195 220 C 170 230, 160 240, 175 265 C 190 270, 195 260, 195 280" fill="none" stroke="url(#wave-pine-dark)" stroke-width="8" stroke-linecap="round" />
  
  <!-- Ground flow ridge -->
  <path d="M 0 360 C 100 330, 300 390, 400 350 L 400 400 L 0 400 Z" fill="#FAF6EE" />
</svg>
